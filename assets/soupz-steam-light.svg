<svg xmlns="http://www.w3.org/2000/svg" width="385" height="385" viewBox="0 0 385 385" fill="none" role="img" aria-label="Soupz — a steaming bowl of soup">
<style>
  /* The steam rises and fades on a stagger, the same motion the bowl uses
     in Soup OS. Loaded as an &lt;img&gt;, so this stylesheet is the only way to
     move it — and the reduced-motion query is still honoured by the browser. */
  .w { transform-box: fill-box; transform-origin: 50% 100%;
       animation: rise 3.4s ease-in-out infinite; will-change: transform, opacity; }
  .w1 { animation-delay: 0s; }
  .w2 { animation-delay: .9s; }
  .w3 { animation-delay: 1.8s; }
  @keyframes rise {
    0%   { opacity: 0;   transform: translateY(6px)   scaleY(.92); }
    30%  { opacity: .95; }
    100% { opacity: 0;   transform: translateY(-22px) scaleY(1.16); }
  }
  @media (prefers-reduced-motion: reduce) {
    .w { animation: none; opacity: .55; transform: none; }
  }
</style>

